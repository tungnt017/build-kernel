name: Build Kernel Lisa + ReSukiSU

on:
  workflow_dispatch:
    inputs:
      resukisu_branch:
        description: "ReSukiSU branch (main / dev)"
        required: false
        default: "main"
        type: choice
        options:
          - main
          - dev
      use_susfs:
        description: "Enable SUSFS mode (instead of Manual Hook)"
        required: false
        type: boolean
        default: false
      apply_optional_hooks:
        description: "Apply optional hooks (input + path_umount)"
        required: false
        type: boolean
        default: false
      clang_version:
        description: "Clang toolchain"
        required: false
        default: "neutron"
        type: choice
        options:
          - neutron
          - proton
          - aosp

jobs:
  build:
    name: Build Kernel for Xiaomi 11 Lite 5G NE (lisa)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      KERNEL_REPO: https://github.com/PixelExperience-Devices/kernel_xiaomi_lisa.git
      KERNEL_BRANCH: thirteen
      DEVICE: lisa
      ARCH: arm64
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 lld zstd

      # ══════════════════════════════════════════
      # Clang Toolchains
      # ══════════════════════════════════════════
      - name: Setup Neutron Clang
        if: ${{ inputs.clang_version == 'neutron' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          cd $GITHUB_WORKSPACE/toolchain/clang
          curl -LSs "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman" -o antman
          chmod +x antman
          ./antman -S
          ./antman --patch=glibc || true
          echo "Neutron Clang installed"
          bin/clang --version 2>/dev/null | head -3 || true

      - name: Setup Proton Clang
        if: ${{ inputs.clang_version == 'proton' }}
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git \
            $GITHUB_WORKSPACE/toolchain/clang

      - name: Setup AOSP Clang
        if: ${{ inputs.clang_version == 'aosp' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz \
            -O /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C $GITHUB_WORKSPACE/toolchain/clang
          rm /tmp/clang.tar.gz

      - name: Clone GCC toolchains
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc64
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git \
            $GITHUB_WORKSPACE/toolchain/gcc32

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b $KERNEL_BRANCH $KERNEL_REPO \
            $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          KVER=$(make kernelversion 2>/dev/null || echo "5.4.x")
          echo "KERNEL_VERSION=$KVER" >> $GITHUB_ENV
          echo "Kernel version: $KVER"

      - name: Detect defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          CONFIGS_DIR="arch/$ARCH/configs"
          for candidate in lisa_defconfig lisa_stock_defconfig vendor/lisa_defconfig vendor/lahaina-qgki_defconfig; do
            if [ -f "$CONFIGS_DIR/$candidate" ]; then
              echo "Found: $candidate"
              echo "DEFCONFIG=$candidate" >> $GITHUB_ENV
              break
            fi
          done
          if ! grep -q DEFCONFIG "$GITHUB_ENV"; then
            echo "No defconfig found!"
            ls -la "$CONFIGS_DIR/" "$CONFIGS_DIR/vendor/" 2>/dev/null || true
            exit 1
          fi

      - name: Integrate ReSukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs \
            "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/${{ inputs.resukisu_branch }}/kernel/setup.sh" \
            | bash -
          echo "ReSukiSU integrated"

      - name: Patch defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          DEFCONFIG_FILE="arch/$ARCH/configs/$DEFCONFIG"
          sed -i '/CONFIG_KSU/d' "$DEFCONFIG_FILE"
          sed -i '/CONFIG_KALLSYMS_ALL/d' "$DEFCONFIG_FILE"
          {
            echo ""
            echo "# ReSukiSU"
            echo "CONFIG_KSU=y"
            echo "CONFIG_KALLSYMS_ALL=y"
          } >> "$DEFCONFIG_FILE"

          if [ "${{ inputs.use_susfs }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG_FILE"
            echo "Mode: SUSFS"
          else
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$DEFCONFIG_FILE"
            echo "Mode: Manual Hook"
          fi

      - name: Apply manual hooks
        if: ${{ inputs.use_susfs != true }}
        run: |
          cd $GITHUB_WORKSPACE/kernel
          chmod +x "$GITHUB_WORKSPACE/patches/apply_hooks.sh"

          if [ "${{ inputs.apply_optional_hooks }}" = "true" ]; then
            bash "$GITHUB_WORKSPACE/patches/apply_hooks.sh" --optional
          else
            bash "$GITHUB_WORKSPACE/patches/apply_hooks.sh"
          fi

      # ══════════════════════════════════════════
      # Fix known Clang build errors
      # ══════════════════════════════════════════
      - name: Fix Clang build errors
        run: |
          cd $GITHUB_WORKSPACE/kernel

          echo "Fixing known Clang build errors..."

          # Fix 1: Export sel_handle_status_ops (ReSukiSU requirement)
          SELINUXFS="security/selinux/selinuxfs.c"
          if [ -f "$SELINUXFS" ]; then
            if grep -q "static const struct file_operations sel_handle_status_ops" "$SELINUXFS"; then
              sed -i 's/static const struct file_operations sel_handle_status_ops/const struct file_operations sel_handle_status_ops/' "$SELINUXFS"
              echo "  Fixed: sel_handle_status_ops exported (removed static)"
            else
              echo "  sel_handle_status_ops: pattern not found or already exported"
            fi
          fi

          # Fix 2: rmnet_ipa.c enum conversion (direct C cast)
          RMNET_IPA="techpack/dataipa/drivers/platform/msm/ipa/ipa_v3/rmnet_ipa.c"
          if [ -f "$RMNET_IPA" ]; then
            sed -i 's/q6_ul_flt_rule_ptr->ip = flt_spec_ptr->ip_type;/q6_ul_flt_rule_ptr->ip = (enum ipa_ip_type)flt_spec_ptr->ip_type;/' "$RMNET_IPA"
            sed -i 's/q6_ul_flt_rule_ptr->action = flt_spec_ptr->filter_action;/q6_ul_flt_rule_ptr->action = (enum ipa_flt_action)flt_spec_ptr->filter_action;/' "$RMNET_IPA"
            echo "  Fixed: rmnet_ipa.c enum casts"
          fi

          # Backup Makefile flag
          DATAIPA_MK="techpack/dataipa/drivers/platform/msm/ipa/ipa_v3/Makefile"
          if [ -f "$DATAIPA_MK" ]; then
            grep -q "Wno-enum-conversion" "$DATAIPA_MK" ||               echo "ccflags-y += -Wno-enum-conversion" >> "$DATAIPA_MK"
          fi

          # Fix 3: tcp_timer.c bit-field truncation
          TCP_TIMER="net/ipv4/tcp_timer.c"
          if [ -f "$TCP_TIMER" ]; then
            sed -i 's/icsk->icsk_mtup\.enabled = 1;/icsk->icsk_mtup.enabled = !!1;/g' "$TCP_TIMER"
            echo "  Fixed: tcp_timer.c bit-field (!!1)"
          fi

          NET_IPV4_MK="net/ipv4/Makefile"
          if [ -f "$NET_IPV4_MK" ]; then
            grep -q "Wno-single-bit-bitfield" "$NET_IPV4_MK" ||               echo "ccflags-y += -Wno-single-bit-bitfield-constant-conversion" >> "$NET_IPV4_MK"
          fi

          # Fix 4: sde_hw_dsc_1_2.c missing return type (-Wimplicit-int)
          DSC_FILE="techpack/display/msm/sde/sde_hw_dsc_1_2.c"
          if [ -f "$DSC_FILE" ]; then
            sed -i 's/static inline _dsc_subblk_offset/static inline int _dsc_subblk_offset/' "$DSC_FILE"
            echo "  Fixed: sde_hw_dsc_1_2.c missing return type"
          fi

          # Fallback: suppress -Wimplicit-int in display techpack
          for MK in $(find techpack/display/ -name "Makefile" 2>/dev/null); do
            grep -q "Wno-implicit-int" "$MK" ||               echo "ccflags-y += -Wno-implicit-int" >> "$MK"
          done

          # Fix 5: msm_ion.c enum comparison (-Wenum-compare)
          ION_HEAPS_MK="drivers/staging/android/ion/heaps/Makefile"
          if [ -f "$ION_HEAPS_MK" ]; then
            grep -q "Wno-enum-compare" "$ION_HEAPS_MK" ||               echo "ccflags-y += -Wno-enum-compare" >> "$ION_HEAPS_MK"
            echo "  Fixed: msm_ion.c enum comparison"
          fi

          echo ""
          echo "All build fixes applied!"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          max-size: 4G

      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel

          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc64/bin:$GITHUB_WORKSPACE/toolchain/gcc32/bin:$PATH"
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          MAKE_ARGS=(
            ARCH=$ARCH
            CC="ccache clang"
            CROSS_COMPILE=$CROSS_COMPILE
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32
            CLANG_TRIPLE=$CLANG_TRIPLE
            HOSTCC=gcc
            HOSTCXX=g++
            HOSTLD=ld
            O=out
          )

          echo "Config: $DEFCONFIG"
          echo "Clang: $(clang --version 2>/dev/null | head -1 || echo 'unknown')"
          make "${MAKE_ARGS[@]}" $DEFCONFIG

          # Force KALLSYMS_ALL after defconfig processing
          scripts/config --file out/.config -e KALLSYMS_ALL
          make "${MAKE_ARGS[@]}" olddefconfig

          # Verify critical configs
          echo "--- Critical config check ---"
          grep -E "CONFIG_KSU|CONFIG_KALLSYMS_ALL" out/.config || true

          echo "Building..."
          make "${MAKE_ARGS[@]}" -j$(nproc --all) 2>&1 | tee build.log

          if [ -f out/arch/$ARCH/boot/Image ]; then
            echo "Build successful!"
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
            ls -lh out/arch/$ARCH/boot/Image
          else
            echo "Build failed!"
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            tail -80 build.log
            exit 1
          fi

      - name: Package with AnyKernel3
        if: env.BUILD_STATUS == 'success'
        run: |
          git clone --depth=1 $ANYKERNEL_REPO $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3
          rm -rf modules patch ramdisk LICENSE README.md

          cat > anykernel.sh << 'AKEOF'
          properties() { '
          kernel.string=ReSukiSU-lisa
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=lisa
          supported.versions=12-15
          '; }
          block=boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          split_boot;
          flash_boot;
          flash_dtbo;
          AKEOF

          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image .
          find $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dts \
            -name "*.dtb" -exec cp {} dtb \; 2>/dev/null || true
          [ -f "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dtbo.img" ] && \
            cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dtbo.img . || true

          DATE=$(date +%Y%m%d-%H%M)
          MODE="${{ inputs.use_susfs == true && 'SUSFS' || 'ManualHook' }}"
          ZIP_NAME="ReSukiSU-${MODE}-lisa-${DATE}.zip"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP_NAME" * -x .git/\*
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload kernel zip
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/kernel/build.log
          retention-days: 7

      - name: Create Release
        if: env.BUILD_STATUS == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-lisa
          name: "ReSukiSU Lisa #${{ github.run_number }}"
          body: |
            ## ReSukiSU — Xiaomi 11 Lite 5G NE (lisa)
            | Item | Detail |
            |---|---|
            | **Kernel** | `${{ env.KERNEL_VERSION }}` |
            | **Defconfig** | `${{ env.DEFCONFIG }}` |
            | **ReSukiSU** | `${{ inputs.resukisu_branch }}` |
            | **Hook mode** | `${{ inputs.use_susfs == true && 'SUSFS' || 'Manual Hook' }}` |
            | **Clang** | `${{ inputs.clang_version }}` |
          files: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          draft: false
          prerelease: true
