name: Build Kernel Lisa + ReSukiSU

on:
  workflow_dispatch:
    inputs:
      resukisu_branch:
        description: "ReSukiSU branch"
        default: "main"
        type: choice
        options: [main, dev]
      use_susfs:
        description: "SUSFS mode"
        type: boolean
        default: false
      apply_optional_hooks:
        description: "Optional hooks (input)"
        type: boolean
        default: false
      clang_version:
        description: "Clang toolchain"
        default: "neutron"
        type: choice
        options: [neutron, proton, aosp]

jobs:
  build:
    name: Build Kernel lisa
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KERNEL_REPO: https://github.com/PixelExperience-Devices/kernel_xiaomi_lisa.git
      KERNEL_BRANCH: thirteen
      ARCH: arm64
      ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 lld zstd

      - name: Setup Neutron Clang
        if: ${{ inputs.clang_version == 'neutron' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          cd $GITHUB_WORKSPACE/toolchain/clang
          curl -LSs "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman" -o antman
          chmod +x antman && ./antman -S && ./antman --patch=glibc || true
          bin/clang --version 2>/dev/null | head -3 || true

      - name: Setup Proton Clang
        if: ${{ inputs.clang_version == 'proton' }}
        run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git $GITHUB_WORKSPACE/toolchain/clang

      - name: Setup AOSP Clang
        if: ${{ inputs.clang_version == 'aosp' }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz -O /tmp/clang.tar.gz
          tar -xzf /tmp/clang.tar.gz -C $GITHUB_WORKSPACE/toolchain/clang && rm /tmp/clang.tar.gz

      - name: Clone GCC
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9.git $GITHUB_WORKSPACE/toolchain/gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9.git $GITHUB_WORKSPACE/toolchain/gcc32

      - name: Clone kernel
        run: |
          git clone --depth=1 -b $KERNEL_BRANCH $KERNEL_REPO $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          echo "KERNEL_VERSION=$(make kernelversion 2>/dev/null)" >> $GITHUB_ENV

      - name: Detect defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          for c in lisa_defconfig lisa_stock_defconfig vendor/lisa_defconfig vendor/lahaina-qgki_defconfig; do
            [ -f "arch/$ARCH/configs/$c" ] && echo "DEFCONFIG=$c" >> $GITHUB_ENV && break
          done

      - name: Integrate ReSukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/${{ inputs.resukisu_branch }}/kernel/setup.sh" | bash -

      - name: Patch defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          F="arch/$ARCH/configs/$DEFCONFIG"
          sed -i '/CONFIG_KSU/d;/CONFIG_KALLSYMS_ALL/d' "$F"
          printf '\n# ReSukiSU\nCONFIG_KSU=y\nCONFIG_KALLSYMS_ALL=y\n' >> "$F"
          if [ "${{ inputs.use_susfs }}" = "true" ]; then echo "CONFIG_KSU_SUSFS=y" >> "$F"
          else echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$F"; fi

      - name: Apply hooks
        if: ${{ inputs.use_susfs != true }}
        run: |
          cd $GITHUB_WORKSPACE/kernel
          chmod +x "$GITHUB_WORKSPACE/patches/apply_hooks.sh"
          if [ "${{ inputs.apply_optional_hooks }}" = "true" ]; then
            bash "$GITHUB_WORKSPACE/patches/apply_hooks.sh" --optional
          else
            bash "$GITHUB_WORKSPACE/patches/apply_hooks.sh"
          fi

      - name: Fix build errors
        run: |
          cd $GITHUB_WORKSPACE/kernel
          SF="security/selinux/selinuxfs.c"

          # Fix: Export sel_handle_status_ops (awk — remove static)
          awk '{if(index($0,"static")>0 && index($0,"sel_handle_status_ops")>0){sub(/^static /,"")} print}' "$SF" > "${SF}.tmp" && mv "${SF}.tmp" "$SF"

          # Fix: Export write_op (awk — remove static + EXPORT_SYMBOL)
          awk '{if(index($0,"static")>0 && index($0,"write_op")>0 && index($0,"ssize_t")>0){sub(/^static /,"")} print}' "$SF" > "${SF}.tmp" && mv "${SF}.tmp" "$SF"
          if ! grep -q "EXPORT_SYMBOL.*write_op" "$SF"; then
            awk 'BEGIN{f=0;d=0} index($0,"write_op")>0 && index($0,"ssize_t")>0{f=1} f&&!d&&/^};/{print;print "EXPORT_SYMBOL_GPL(write_op);";f=0;d=1;next} {print}' "$SF" > "${SF}.tmp" && mv "${SF}.tmp" "$SF"
          fi

          # Fix: path_umount EXPORT (backup if apply_hooks missed it)
          NS="fs/namespace.c"
          if grep -q "int path_umount" "$NS" && ! grep -q "EXPORT_SYMBOL(path_umount)" "$NS"; then
            awk 'BEGIN{f=0;d=0} /^int path_umount/{f=1} f&&!d&&/^}/{print;print "EXPORT_SYMBOL(path_umount);";f=0;d=1;next} {print}' "$NS" > "${NS}.tmp" && mv "${NS}.tmp" "$NS"
          fi

          # Fix: rmnet_ipa enum casts
          R="techpack/dataipa/drivers/platform/msm/ipa/ipa_v3/rmnet_ipa.c"
          [ -f "$R" ] && sed -i 's/q6_ul_flt_rule_ptr->ip = flt_spec_ptr->ip_type;/q6_ul_flt_rule_ptr->ip = (enum ipa_ip_type)flt_spec_ptr->ip_type;/;s/q6_ul_flt_rule_ptr->action = flt_spec_ptr->filter_action;/q6_ul_flt_rule_ptr->action = (enum ipa_flt_action)flt_spec_ptr->filter_action;/' "$R"
          M="techpack/dataipa/drivers/platform/msm/ipa/ipa_v3/Makefile"
          [ -f "$M" ] && grep -q "Wno-enum" "$M" || echo "ccflags-y += -Wno-enum-conversion" >> "$M" 2>/dev/null

          # Fix: tcp_timer bitfield
          T="net/ipv4/tcp_timer.c"
          [ -f "$T" ] && sed -i 's/icsk->icsk_mtup\.enabled = 1;/icsk->icsk_mtup.enabled = !!1;/g' "$T"
          [ -f "net/ipv4/Makefile" ] && grep -q "Wno-single-bit" "net/ipv4/Makefile" || echo "ccflags-y += -Wno-single-bit-bitfield-constant-conversion" >> "net/ipv4/Makefile" 2>/dev/null

          # Fix: sde_hw_dsc missing return type
          D="techpack/display/msm/sde/sde_hw_dsc_1_2.c"
          [ -f "$D" ] && sed -i 's/static inline _dsc_subblk_offset/static inline int _dsc_subblk_offset/' "$D"
          for MK in $(find techpack/display/ -name "Makefile" 2>/dev/null); do
            grep -q "Wno-implicit-int" "$MK" || echo "ccflags-y += -Wno-implicit-int" >> "$MK"
          done

          # Fix: ion enum compare
          [ -f "drivers/staging/android/ion/heaps/Makefile" ] && grep -q "Wno-enum-compare" "drivers/staging/android/ion/heaps/Makefile" || echo "ccflags-y += -Wno-enum-compare" >> "drivers/staging/android/ion/heaps/Makefile" 2>/dev/null

          # Fix: usbdtp bitfield
          [ -f "drivers/usb/misc/Makefile" ] && grep -q "Wno-single-bit" "drivers/usb/misc/Makefile" || echo "ccflags-y += -Wno-single-bit-bitfield-constant-conversion" >> "drivers/usb/misc/Makefile" 2>/dev/null

          # Fix: qcacld array param
          [ -f "drivers/staging/qcacld-3.0/Kbuild" ] && grep -q "Wno-array-parameter" "drivers/staging/qcacld-3.0/Kbuild" || echo "ccflags-y += -Wno-array-parameter" >> "drivers/staging/qcacld-3.0/Kbuild" 2>/dev/null

          # Verify exports
          echo "--- Verifying symbol exports ---"
          grep -n "EXPORT_SYMBOL.*path_umount" fs/namespace.c || echo "WARNING: path_umount EXPORT missing!"
          grep -n "EXPORT_SYMBOL.*write_op" "$SF" || echo "WARNING: write_op EXPORT missing!"
          grep -n "sel_handle_status_ops" "$SF" | head -2

      - uses: hendrikmuhs/ccache-action@v1
        with:
          max-size: 4G

      - name: Build kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$GITHUB_WORKSPACE/toolchain/gcc64/bin:$GITHUB_WORKSPACE/toolchain/gcc32/bin:$PATH"
          export CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- CLANG_TRIPLE=aarch64-linux-gnu-
          MAKE_ARGS=(ARCH=$ARCH CC="ccache clang" CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 CLANG_TRIPLE=$CLANG_TRIPLE HOSTCC=gcc HOSTCXX=g++ HOSTLD=ld O=out)
          make "${MAKE_ARGS[@]}" $DEFCONFIG
          scripts/config --file out/.config -e KALLSYMS_ALL
          make "${MAKE_ARGS[@]}" olddefconfig
          make "${MAKE_ARGS[@]}" -j$(nproc --all) 2>&1 | tee build.log
          if [ -f out/arch/$ARCH/boot/Image ]; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
            tail -80 build.log; exit 1
          fi

      - name: Package AnyKernel3
        if: env.BUILD_STATUS == 'success'
        run: |
          git clone --depth=1 $ANYKERNEL_REPO $GITHUB_WORKSPACE/AnyKernel3
          cd $GITHUB_WORKSPACE/AnyKernel3 && rm -rf modules patch ramdisk LICENSE README.md
          cat > anykernel.sh << 'AKEOF'
          properties() { '
          kernel.string=ReSukiSU-lisa
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          device.name1=lisa
          supported.versions=12-15
          '; }
          block=boot; is_slot_device=1; ramdisk_compression=auto; patch_vbmeta_flag=auto;
          . tools/ak3-core.sh; split_boot; flash_boot; flash_dtbo;
          AKEOF
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image .
          find $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} dtb \; 2>/dev/null || true
          [ -f "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dtbo.img" ] && cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dtbo.img . || true
          ZIP="ReSukiSU-${{ inputs.use_susfs == true && 'SUSFS' || 'ManualHook' }}-lisa-$(date +%Y%m%d-%H%M).zip"
          zip -r9 "$GITHUB_WORKSPACE/$ZIP" * -x .git/\*
          echo "ZIP_NAME=$ZIP" >> $GITHUB_ENV

      - name: Upload zip
        if: env.BUILD_STATUS == 'success'
        uses: actions/upload-artifact@v4
        with: { name: "${{ env.ZIP_NAME }}", path: "${{ github.workspace }}/${{ env.ZIP_NAME }}", retention-days: 30 }

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: build-log, path: "${{ github.workspace }}/kernel/build.log", retention-days: 7 }

      - name: Release
        if: env.BUILD_STATUS == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-lisa
          name: "ReSukiSU Lisa #${{ github.run_number }}"
          body: "ReSukiSU kernel for Xiaomi 11 Lite 5G NE (lisa) - Kernel ${{ env.KERNEL_VERSION }}"
          files: ${{ github.workspace }}/${{ env.ZIP_NAME }}
          prerelease: true
